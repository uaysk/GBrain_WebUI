services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: gbrain-3d-memory-map:local
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-3000}
    ports:
      - "${APP_PUBLISHED_HOST:-127.0.0.1}:${APP_PUBLISHED_PORT:-3100}:${APP_PORT:-3000}"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,uid=1000,gid=1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.APP_PORT||'3000')+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
